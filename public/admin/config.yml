backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "testimonials"
    label: "Testimonios"
    label_singular: "Testimonio"
    folder: "content/testimonials"
    create: true
    delete: true
    identifier_field: name
    format: "json"
    fields:
      - { label: "Nombre del estudiante", name: "name", widget: "string" }
      - { label: "Curso / motivo", name: "role", widget: "string", hint: "Ej. Clases de inglés, Preparación para examen internacional" }
      - { label: "Opinión", name: "quote", widget: "text" }
      - { label: "Calificación", name: "rating", widget: "number", value_type: "int", min: 1, max: 5, default: 5 }
      - { label: "Orden", name: "order", widget: "number", value_type: "int", default: 1, hint: "Los testimonios se muestran de menor a mayor número." }
